<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DocFinder Preview</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── CSS variables for theming ── */
    :root {
      --bg:       #0f1117;
      --bg2:      #1a1d2e;
      --bg3:      #13151f;
      --border:   #2d3748;
      --border2:  #1e2333;
      --text:     #e2e8f0;
      --text2:    #94a3b8;
      --text3:    #64748b;
      --accent:   #3b82f6;
      --accent2:  #60a5fa;
      --btn-sec:  #374151;
      --btn-sec2: #4b5563;
      --text-pre: #e2e8f0;
      --pre-bg:   #0d1117;
      --code-keyword:  #ff79c6;
      --code-string:   #f1fa8c;
      --code-comment:  #6272a4;
      --code-number:   #bd93f9;
      --code-function: #50fa7b;
    }
    body.light {
      --bg:       #f8fafc;
      --bg2:      #ffffff;
      --bg3:      #f1f5f9;
      --border:   #e2e8f0;
      --border2:  #cbd5e1;
      --text:     #1e293b;
      --text2:    #475569;
      --text3:    #94a3b8;
      --accent:   #2563eb;
      --accent2:  #1d4ed8;
      --btn-sec:  #e2e8f0;
      --btn-sec2: #cbd5e1;
      --text-pre: #1e293b;
      --pre-bg:   #f8fafc;
      --code-keyword:  #d73a49;
      --code-string:   #032f62;
      --code-comment:  #6a737d;
      --code-number:   #005cc5;
      --code-function: #6f42c1;
    }

    body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

    /* ── Header ── */
    .header { display: flex; gap: 8px; padding: 10px 16px; background: var(--bg3); border-bottom: 1px solid var(--border); align-items: center; }
    .header .file-name { flex: 1; font-size: 0.9rem; color: var(--text); font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .header button { padding: 5px 12px; border-radius: 6px; border: none; background: var(--btn-sec); color: var(--text2); font-size: 0.82rem; cursor: pointer; white-space: nowrap; }
    .header button:hover { background: var(--btn-sec2); color: var(--text); }

    /* ── Content area ── */
    .content { flex: 1; overflow: hidden; position: relative; display: flex; flex-direction: column; }

    /* ── Preview container ── */
    #previewPane { flex: 1; overflow: auto; background: var(--bg2); position: relative; }
    #previewPane.text-mode { background: var(--pre-bg); padding: 16px; }
    #previewPane pre { font-family: 'Cascadia Code','Consolas','Fira Mono','Monaco',monospace; font-size: 0.78rem; line-height: 1.6; color: var(--text-pre); white-space: pre-wrap; word-break: break-word; margin: 0; }

    /* Syntax highlighting */
    .code-keyword  { color: var(--code-keyword);  font-weight: 500; }
    .code-string   { color: var(--code-string); }
    .code-comment  { color: var(--code-comment); font-style: italic; }
    .code-number   { color: var(--code-number); }
    .code-function { color: var(--code-function); }

    /* Image preview */
    #previewPane img { max-width: 100%; height: auto; display: block; margin: 20px auto; }

    /* PDF preview */
    #previewPane iframe { width: 100%; height: 100%; border: none; display: block; }

    /* Messages */
    .message-box { padding: 40px 20px; text-align: center; max-width: 500px; margin: 40px auto; }
    .message-box h3 { font-size: 1.1rem; margin-bottom: 12px; color: var(--text); }
    .message-box p { font-size: 0.85rem; color: var(--text2); margin-bottom: 8px; line-height: 1.5; }
    .message-box .file-info { font-weight: 500; color: var(--text); }
    .message-box .format-badge { display: inline-block; background: var(--bg3); color: var(--text2); padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; margin: 0 4px; font-family: monospace; }
    .message-box button { margin-top: 16px; padding: 8px 20px; background: var(--accent); color: white; border: none; border-radius: 6px; font-size: 0.85rem; cursor: pointer; }
    .message-box button:hover { background: var(--accent2); }
    .error-message { border: 1px solid #ef4444; background: rgba(239, 68, 68, 0.1); border-radius: 8px; }
    .error-message h3 { color: #ef4444; }
    .error-details { font-size: 0.75rem; color: var(--text3); margin-top: 8px; font-family: monospace; }
    .unsupported-format { border: 1px solid var(--border); background: var(--bg3); border-radius: 8px; }
    .download-only { border: 1px solid #f59e0b; background: rgba(245, 158, 11, 0.1); border-radius: 8px; }
    .download-only h3 { color: #f59e0b; }

    /* ── Loading overlay ── */
    #loadingOverlay { display: flex; position: absolute; inset: 0; background: rgba(0,0,0,0.6); z-index: 50; align-items: center; justify-content: center; flex-direction: column; gap: 12px; }
    #loadingOverlay.hidden { display: none; }
    #loadingOverlay .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.2); border-top-color: var(--accent2); border-radius: 50%; animation: spin 0.8s linear infinite; }
    #loadingOverlay .text { color: #e2e8f0; font-size: 0.85rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    /* Office document preview (js-preview) */
    .office-doc-wrapper { width: 100%; height: 100%; overflow: auto; background: #fff; }
  </style>
</head>
<body>
<div class="header">
  <span class="file-name" id="fileNameLabel">Loading...</span>
  <button id="themeToggle" title="Toggle theme">🌙</button>
  <button id="downloadBtn" title="Download file">⬇️ Download</button>
</div>

<div class="content">
  <div id="loadingOverlay">
    <div class="spinner"></div>
    <div class="text">Loading preview...</div>
  </div>
  <div id="previewPane"></div>
</div>

<script>
(function() {
  'use strict';

  // ── Configuration ──────────────────────────────────────────────────────────
  var TEXT_MAX_BYTES = 512 * 1024; // 512 KB
  var PREVIEW_TIMEOUT_MS = 30000;  // 30 seconds

  var TEXT_EXTS = ['txt','log','md','markdown','csv','tsv','json','jsonl','xml','yaml','yml',
                   'toml','ini','cfg','conf','properties','sh','bash','zsh','bat','cmd','ps1',
                   'py','pyw','js','ts','jsx','tsx','java','kt','go','rs','c','cpp','h','hpp',
                   'cs','vb','rb','php','html','htm','css','scss','sass','less','sql','r',
                   'gitignore','dockerfile','makefile','gradle','mvnw','lock','editorconfig',
                   'gitattributes','eslintrc','babelrc','prettierrc','env'];

  var IMAGE_EXTS = ['jpg','jpeg','png','gif','bmp','svg','webp','ico'];

  var OFFICE_EXTS = ['doc','docx','xls','xlsx','ppt','pptx'];

  var DOWNLOAD_ONLY = ['ofd','dwg','dxf','zip','rar','7z','tar','gz','bz2','xz',
                       'mp4','avi','mkv','mov','wmv','flv','webm','mp3','wav','flac','aac',
                       'exe','dll','so','dylib','bin','dat'];

  // ── DOM Elements ───────────────────────────────────────────────────────────
  var fileNameLabel = document.getElementById('fileNameLabel');
  var themeToggle = document.getElementById('themeToggle');
  var downloadBtn = document.getElementById('downloadBtn');
  var loadingOverlay = document.getElementById('loadingOverlay');
  var previewPane = document.getElementById('previewPane');

  var currentFilePath = null;
  var currentFileName = null;
  var abortController = null;

  // ── Theme Management ───────────────────────────────────────────────────────
  var THEME_KEY = 'docfinder-theme';

  function applyTheme(theme) {
    if (theme === 'light') {
      document.body.classList.add('light');
      themeToggle.textContent = '☀️';
      themeToggle.title = 'Switch to dark theme';
    } else {
      document.body.classList.remove('light');
      themeToggle.textContent = '🌙';
      themeToggle.title = 'Switch to light theme';
    }
    try {
      localStorage.setItem(THEME_KEY, theme);
    } catch(e) {}
  }

  themeToggle.addEventListener('click', function() {
    applyTheme(document.body.classList.contains('light') ? 'dark' : 'light');
  });

  var savedTheme = 'dark';
  try {
    savedTheme = localStorage.getItem(THEME_KEY) || 'dark';
  } catch(e) {}
  applyTheme(savedTheme);

  // ── Utility Functions ──────────────────────────────────────────────────────
  function escapeHtml(str) {
    var div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function getFileExtension(filename) {
    if (!filename) return '';
    var parts = filename.split('.');
    return parts.length > 1 ? parts.pop().toLowerCase() : '';
  }

  function isTextFile(ext) {
    return TEXT_EXTS.indexOf(ext) >= 0;
  }

  function isImageFile(ext) {
    return IMAGE_EXTS.indexOf(ext) >= 0;
  }

  function isOfficeFile(ext) {
    return OFFICE_EXTS.indexOf(ext) >= 0;
  }

  function isDownloadOnly(ext) {
    return DOWNLOAD_ONLY.indexOf(ext) >= 0;
  }

  function hideLoading() {
    loadingOverlay.classList.add('hidden');
  }

  function showLoading(message) {
    loadingOverlay.classList.remove('hidden');
    var textEl = loadingOverlay.querySelector('.text');
    if (textEl) textEl.textContent = message || 'Loading preview...';
  }

  // ── Error and Message Display ──────────────────────────────────────────────
  function showErrorMessage(error, fileName) {
    hideLoading();
    var errorHtml = '<div class="message-box error-message">' +
      '<h3>⚠ Preview Failed</h3>' +
      '<p>Could not preview file: <strong>' + escapeHtml(fileName) + '</strong></p>' +
      '<p class="error-details">' + escapeHtml(error.message || 'Unknown error') + '</p>' +
      '<button onclick="downloadCurrentFile()">Download File</button>' +
      '</div>';
    previewPane.innerHTML = errorHtml;
    console.error('Preview error:', {
      fileName: fileName,
      error: error.message,
      stack: error.stack
    });
  }

  function showUnsupportedMessage(fileName, ext) {
    hideLoading();
    var messageHtml = '<div class="message-box unsupported-format">' +
      '<h3>Preview Not Available</h3>' +
      '<p>The file format <span class="format-badge">.' + escapeHtml(ext) + '</span> is not supported for preview.</p>' +
      '<p>File: <span class="file-info">' + escapeHtml(fileName) + '</span></p>' +
      '<p style="margin-top:12px;font-size:0.8rem;color:var(--text3);">Supported formats: PDF, text/code files, and images.</p>' +
      '<button onclick="downloadCurrentFile()">Download File</button>' +
      '</div>';
    previewPane.innerHTML = messageHtml;
    console.log('Unsupported format:', ext, 'for file:', fileName);
  }

  function showDownloadOnlyMessage(fileName, ext) {
    hideLoading();
    var messageHtml = '<div class="message-box download-only">' +
      '<h3>📥 Download Required</h3>' +
      '<p>Files with format <span class="format-badge">.' + escapeHtml(ext) + '</span> cannot be previewed in the browser.</p>' +
      '<p>File: <span class="file-info">' + escapeHtml(fileName) + '</span></p>' +
      '<p style="margin-top:8px;font-size:0.8rem;">Please download the file to view it with the appropriate application.</p>' +
      '<button onclick="downloadCurrentFile()">Download File</button>' +
      '</div>';
    previewPane.innerHTML = messageHtml;
    console.log('Download-only format:', ext, 'for file:', fileName);
  }

  function showOfficeDocumentMessage(fileName, ext) {
    hideLoading();
    var fileUrl = '/api/file?path=' + encodeURIComponent(currentFilePath);
    var messageHtml = '<div class="message-box office-preview">' +
      '<h3>📄 Office Document</h3>' +
      '<p>Office format <span class="format-badge">.' + escapeHtml(ext) + '</span> cannot be rendered in-browser.</p>' +
      '<p>File: <span class="file-info">' + escapeHtml(fileName) + '</span></p>' +
      '<div style="margin-top:12px;">' +
      '<button onclick="window.open(\'' + fileUrl + '\', \'_blank\')" style="margin-right:8px;">Open in New Tab</button>' +
      '<button onclick="downloadCurrentFile()">Download File</button>' +
      '</div>' +
      '</div>';
    previewPane.innerHTML = messageHtml;
    console.log('Office document fallback:', ext, 'for file:', fileName);
  }

  // ── js-preview lazy loader ─────────────────────────────────────────────────
  var jspreviewState = 'idle'; // 'idle' | 'loading' | 'ready' | 'error'
  var jspreviewQueue = [];

  function loadScriptTag(url, onok, onerr) {
    var s = document.createElement('script');
    s.src = url;
    s.onload = onok;
    s.onerror = onerr || function() {};
    document.head.appendChild(s);
  }

  function loadCSSTag(url) {
    var link = document.createElement('link');
    link.rel = 'stylesheet';
    link.href = url;
    document.head.appendChild(link);
  }

  function withJsPreview(cb) {
    if (jspreviewState === 'ready') { cb(null); return; }
    if (jspreviewState === 'error') { cb(new Error('js-preview unavailable')); return; }
    jspreviewQueue.push(cb);
    if (jspreviewState === 'loading') return;
    jspreviewState = 'loading';

    function flush(err) {
      jspreviewState = err ? 'error' : 'ready';
      var q = jspreviewQueue.splice(0);
      q.forEach(function(fn) { fn(err); });
    }

    loadCSSTag('/web/vendor/js-preview/docx/lib/index.css');
    loadCSSTag('/web/vendor/js-preview/excel/lib/index.css');
    var n = 2, errs = [];
    function done(err) {
      if (err) errs.push(err);
      if (--n === 0) flush(errs.length ? errs[0] : null);
    }
    loadScriptTag('/web/vendor/js-preview/docx/lib/index.umd.js',
      function() { done(null); }, function() { done(new Error('docx local asset load failed')); });
    loadScriptTag('/web/vendor/js-preview/excel/lib/index.umd.js',
      function() { done(null); }, function() { done(new Error('excel local asset load failed')); });
  }

  // ── Office document preview via @js-preview ────────────────────────────────
  var currentOfficePreviewer = null;

  function loadOfficePreview(filePath, fileName, ext) {
    // Formats not supported by @js-preview – fall back immediately
    if (ext === 'doc' || ext === 'ppt' || ext === 'pptx' || ext === 'xls') {
      showOfficeDocumentMessage(fileName, ext);
      return;
    }

    if (abortController) abortController.abort();
    abortController = new AbortController();
    var signal = abortController.signal;

    showLoading('Loading ' + ext.toUpperCase() + ' preview…');
    previewPane.classList.remove('text-mode');
    previewPane.innerHTML = '';

    var wrapper = document.createElement('div');
    wrapper.className = 'office-doc-wrapper';
    previewPane.appendChild(wrapper);
    // Set explicit pixel height so js-preview renderer can measure its container
    wrapper.style.height = previewPane.clientHeight + 'px';

    var fileUrl = '/api/file?path=' + encodeURIComponent(filePath);

    withJsPreview(function(err) {
      if (signal.aborted) return;
      if (err) {
        console.warn('js-preview local asset load failed, showing fallback:', err.message);
        showOfficeDocumentMessage(fileName, ext);
        return;
      }

      var factory = ext === 'docx' ? window.jsPreviewDocx
                  : ext === 'xlsx' ? window.jsPreviewExcel
                  : null;

      if (!factory || typeof factory.init !== 'function') {
        console.warn('js-preview renderer not available for ext:', ext);
        showOfficeDocumentMessage(fileName, ext);
        return;
      }

      try {
        if (currentOfficePreviewer) {
          try { currentOfficePreviewer.destroy(); } catch(e) {}
          currentOfficePreviewer = null;
        }
        var previewer = factory.init(wrapper);
        currentOfficePreviewer = previewer;
        previewer.preview(fileUrl)
          .then(function() {
            if (!signal.aborted) hideLoading();
            console.log('Office preview rendered:', fileName);
          })
          .catch(function(renderErr) {
            if (!signal.aborted) {
              console.error('Office render failed:', renderErr);
              showOfficeDocumentMessage(fileName, ext);
            }
          });
      } catch(initErr) {
        console.error('Office preview init failed:', initErr);
        showOfficeDocumentMessage(fileName, ext);
      }
    });
  }

  // ── Download Function ──────────────────────────────────────────────────────
  window.downloadCurrentFile = function() {
    if (!currentFilePath || !currentFileName) return;
    var a = document.createElement('a');
    a.href = '/api/file?path=' + encodeURIComponent(currentFilePath);
    a.download = currentFileName;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  };

  downloadBtn.addEventListener('click', window.downloadCurrentFile);

  // ── Simple Syntax Highlighting ─────────────────────────────────────────────
  function applySyntaxHighlighting(text, ext) {
    // Simple regex-based highlighting for common patterns
    var highlighted = text;

    // Comments (support //, #, <!-- -->)
    highlighted = highlighted.replace(/(\/\/[^\n]*|#[^\n]*|&lt;!--[\s\S]*?--&gt;)/g, '<span class="code-comment">$1</span>');

    // Strings (single and double quotes)
    highlighted = highlighted.replace(/(&quot;[^&quot;]*&quot;|'[^']*')/g, '<span class="code-string">$1</span>');

    // Keywords (common across languages)
    var keywords = ['function','class','const','let','var','if','else','for','while','return',
                    'import','export','from','default','async','await','try','catch','throw',
                    'public','private','protected','static','void','int','string','boolean',
                    'true','false','null','undefined','new','this','super','extends','implements'];
    var keywordPattern = '\\b(' + keywords.join('|') + ')\\b';
    highlighted = highlighted.replace(new RegExp(keywordPattern, 'g'), '<span class="code-keyword">$1</span>');

    // Numbers
    highlighted = highlighted.replace(/\b(\d+\.?\d*)\b/g, '<span class="code-number">$1</span>');

    return highlighted;
  }

  // ── Preview Loaders ────────────────────────────────────────────────────────
  function loadTextPreview(filePath, fileName, ext) {
    if (abortController) abortController.abort();
    abortController = new AbortController();

    showLoading('Loading text preview...');

    // Fetch from /api/text which detects encoding server-side and returns UTF-8
    fetch('/api/text?path=' + encodeURIComponent(filePath), {
      signal: abortController.signal
    })
      .then(function(resp) {
        if (!resp.ok) throw new Error('HTTP ' + resp.status + ': ' + resp.statusText);
        var wasTruncated = resp.headers.get('X-Truncated') === 'true';
        var detectedCharset = resp.headers.get('X-Detected-Charset') || 'unknown';
        return resp.text().then(function(text) {
          return { text: text, truncated: wasTruncated, charset: detectedCharset };
        });
      })
      .then(function(result) {
        var escapedText = escapeHtml(result.text);
        var highlightedText = applySyntaxHighlighting(escapedText, ext);

        hideLoading();
        previewPane.classList.add('text-mode');
        previewPane.innerHTML = '<pre>' + highlightedText + '</pre>';

        if (result.truncated) {
          var notice = document.createElement('div');
          notice.style.cssText = 'padding:12px;background:var(--bg3);color:var(--text3);font-size:0.8rem;text-align:center;border-top:1px solid var(--border)';
          notice.textContent = '⚠ File truncated at ' + TEXT_MAX_BYTES + ' bytes for preview';
          previewPane.appendChild(notice);
        }

        console.log('Text preview loaded:', fileName, '(charset:', result.charset + ')');
      })
      .catch(function(err) {
        if (err.name === 'AbortError') return;
        showErrorMessage(err, fileName);
      });
  }

  function loadImagePreview(filePath, fileName) {
    if (abortController) abortController.abort();
    abortController = new AbortController();

    showLoading('Loading image...');

    var img = document.createElement('img');
    img.style.maxWidth = '100%';
    img.style.height = 'auto';
    img.style.display = 'block';
    img.style.margin = '20px auto';

    img.onload = function() {
      hideLoading();
    };

    img.onerror = function() {
      showErrorMessage(new Error('Failed to load image'), fileName);
    };

    img.src = '/api/file?path=' + encodeURIComponent(filePath);
    previewPane.innerHTML = '';
    previewPane.appendChild(img);
  }

  function loadPdfPreview(filePath, fileName) {
    if (abortController) abortController.abort();
    abortController = new AbortController();

    showLoading('Loading PDF...');

    var iframe = document.createElement('iframe');
    iframe.style.width = '100%';
    iframe.style.height = '100%';
    iframe.style.border = 'none';
    iframe.style.display = 'block';

    iframe.onload = function() {
      hideLoading();
    };

    iframe.onerror = function() {
      showErrorMessage(new Error('Failed to load PDF'), fileName);
    };

    iframe.src = '/api/file?path=' + encodeURIComponent(filePath);
    previewPane.innerHTML = '';
    previewPane.appendChild(iframe);

    setTimeout(function() {
      hideLoading();
    }, PREVIEW_TIMEOUT_MS);
  }

  // ── Main Preview Router ────────────────────────────────────────────────────
  function loadPreview(filePath, fileName) {
    var ext = getFileExtension(fileName);

    console.log('Loading preview:', {
      filePath: filePath,
      fileName: fileName,
      extension: ext
    });

    try {
      if (isTextFile(ext)) {
        loadTextPreview(filePath, fileName, ext);
      } else if (isImageFile(ext)) {
        loadImagePreview(filePath, fileName);
      } else if (ext === 'pdf') {
        loadPdfPreview(filePath, fileName);
      } else if (isOfficeFile(ext)) {
        loadOfficePreview(filePath, fileName, ext);
      } else if (isDownloadOnly(ext)) {
        showDownloadOnlyMessage(fileName, ext);
      } else {
        showUnsupportedMessage(fileName, ext);
      }
    } catch (error) {
      showErrorMessage(error, fileName);
    }
  }

  // ── Initialization ─────────────────────────────────────────────────────────
  var params = new URLSearchParams(window.location.search);
  var filePath = params.get('path');

  if (!filePath) {
    hideLoading();
    previewPane.innerHTML = '<div class="message-box error-message">' +
      '<h3>⚠ No File Specified</h3>' +
      '<p>Please provide a file path using the <code>?path=</code> parameter.</p>' +
      '</div>';
    return;
  }

  currentFilePath = filePath;
  currentFileName = filePath.split(/[/\\]/).pop() || filePath;
  fileNameLabel.textContent = currentFileName;

  loadPreview(filePath, currentFileName);
})();
</script>
</body>
</html>
