<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DocFinder Web</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }
    header { background: #1a1d2e; border-bottom: 1px solid #2d3748; padding: 12px 20px; display: flex; align-items: center; gap: 12px; }
    header h1 { font-size: 1.2rem; font-weight: 700; color: #60a5fa; letter-spacing: 0.02em; }
    header span.tag { font-size: 0.7rem; background: #2d3748; color: #94a3b8; border-radius: 4px; padding: 2px 6px; }
    .search-bar { display: flex; gap: 8px; padding: 16px 20px; background: #13151f; border-bottom: 1px solid #2d3748; flex-wrap: wrap; }
    .search-bar input[type=text] { flex: 1; min-width: 200px; padding: 8px 12px; border-radius: 6px; border: 1px solid #3d4a5c; background: #1e2333; color: #e2e8f0; font-size: 0.95rem; outline: none; }
    .search-bar input[type=text]:focus { border-color: #60a5fa; }
    .search-bar select { padding: 8px 10px; border-radius: 6px; border: 1px solid #3d4a5c; background: #1e2333; color: #e2e8f0; font-size: 0.85rem; cursor: pointer; }
    .search-bar input[type=text]#extInput { min-width: 0; flex: 0 0 110px; }
    .search-bar button { padding: 8px 18px; border-radius: 6px; border: none; background: #3b82f6; color: #fff; font-size: 0.9rem; font-weight: 600; cursor: pointer; white-space: nowrap; }
    .search-bar button:hover { background: #2563eb; }
    .main { display: flex; height: calc(100vh - 106px); overflow: hidden; }
    .results-pane { flex: 1; overflow-y: auto; }
    .status-bar { padding: 6px 20px; font-size: 0.78rem; color: #64748b; background: #0f1117; border-bottom: 1px solid #1e2333; min-height: 28px; }
    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    thead th { position: sticky; top: 0; background: #1a1d2e; padding: 8px 12px; text-align: left; font-weight: 600; color: #94a3b8; border-bottom: 1px solid #2d3748; white-space: nowrap; cursor: pointer; user-select: none; }
    thead th:hover { color: #e2e8f0; }
    tbody tr { border-bottom: 1px solid #1a1d2e; cursor: pointer; transition: background 0.1s; }
    tbody tr:hover { background: #1e2840; }
    tbody tr.selected { background: #1e3a5f; }
    td { padding: 7px 12px; vertical-align: middle; max-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    td.name { color: #93c5fd; font-weight: 500; }
    td.path { color: #64748b; }
    td.match { color: #6ee7b7; font-size: 0.75rem; }
    td.score { color: #94a3b8; font-size: 0.78rem; }
    td.size { color: #94a3b8; text-align: right; }
    .preview-pane { width: 340px; min-width: 200px; border-left: 1px solid #2d3748; background: #13151f; display: flex; flex-direction: column; overflow: hidden; }
    .preview-header { padding: 8px 14px; font-size: 0.78rem; color: #64748b; border-bottom: 1px solid #1e2333; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .preview-body { flex: 1; overflow-y: auto; padding: 12px 14px; font-family: 'JetBrains Mono', Consolas, monospace; font-size: 0.72rem; line-height: 1.6; color: #cbd5e1; white-space: pre-wrap; word-break: break-word; }
    .empty-state { text-align: center; padding: 60px 20px; color: #4b5563; }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: 10px; }
    .empty-state p { font-size: 0.9rem; }
    .dir-icon::before { content: "📁 "; }
    .file-icon::before { content: "📄 "; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #3d4a5c; border-top-color: #60a5fa; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<header>
  <h1>🔍 DocFinder</h1>
  <span class="tag">Web Interface</span>
</header>

<div class="search-bar">
  <input type="text" id="queryInput" placeholder="Search files… (e.g. kubernetes, name:*.xlsx)" autofocus/>
  <select id="scopeSelect" title="Search scope">
    <option value="ALL">All Fields</option>
    <option value="NAME">Name Only</option>
    <option value="CONTENT">Content Only</option>
    <option value="FOLDER">Folders</option>
  </select>
  <select id="modeSelect" title="Match mode">
    <option value="FUZZY">Fuzzy</option>
    <option value="EXACT">Exact</option>
  </select>
  <input type="text" id="extInput" placeholder="ext: pdf,docx" title="Filter by extension (comma-separated)"/>
  <select id="limitSelect" title="Result limit">
    <option value="50">50 results</option>
    <option value="100">100 results</option>
    <option value="200">200 results</option>
  </select>
  <button id="searchBtn">Search</button>
</div>

<div class="status-bar" id="statusBar">Enter a query to search indexed files.</div>

<div class="main">
  <div class="results-pane">
    <div id="emptyState" class="empty-state">
      <div class="icon">🗂</div>
      <p>Your search results will appear here.</p>
    </div>
    <table id="resultsTable" style="display:none">
      <thead>
        <tr>
          <th data-col="name">Name</th>
          <th data-col="path">Path</th>
          <th data-col="match">Match</th>
          <th data-col="size">Size</th>
          <th data-col="score">Score</th>
        </tr>
      </thead>
      <tbody id="resultsBody"></tbody>
    </table>
  </div>
  <div class="preview-pane">
    <div class="preview-header" id="previewHeader">Preview</div>
    <div class="preview-body" id="previewBody">Select a result to preview.</div>
  </div>
</div>

<script>
(function() {
  'use strict';

  var queryInput = document.getElementById('queryInput');
  var scopeSelect = document.getElementById('scopeSelect');
  var modeSelect  = document.getElementById('modeSelect');
  var extInput    = document.getElementById('extInput');
  var limitSelect = document.getElementById('limitSelect');
  var searchBtn   = document.getElementById('searchBtn');
  var statusBar   = document.getElementById('statusBar');
  var emptyState  = document.getElementById('emptyState');
  var resultsTable= document.getElementById('resultsTable');
  var resultsBody = document.getElementById('resultsBody');
  var previewHeader = document.getElementById('previewHeader');
  var previewBody   = document.getElementById('previewBody');

  var currentResults = [];
  var selectedIndex  = -1;
  var searchToken    = 0;

  function formatSize(bytes) {
    if (bytes <= 0) return '–';
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
    if (bytes < 1073741824) return (bytes / 1048576).toFixed(1) + ' MB';
    return (bytes / 1073741824).toFixed(2) + ' GB';
  }

  function search() {
    var q = queryInput.value.trim();
    if (!q) return;
    var token = ++searchToken;
    var scope = scopeSelect.value;
    var mode  = modeSelect.value;
    var ext   = extInput.value.trim();
    var limit = limitSelect.value;

    statusBar.innerHTML = '<span class="spinner"></span>Searching…';

    var url = '/api/search?q=' + encodeURIComponent(q)
            + '&scope=' + scope + '&mode=' + mode
            + '&limit=' + limit
            + (ext ? '&ext=' + encodeURIComponent(ext) : '');

    var t0 = Date.now();
    fetch(url)
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (token !== searchToken) return; // 过期响应
        var elapsed = Date.now() - t0;
        if (data.error) {
          statusBar.textContent = 'Error: ' + data.error;
          return;
        }
        currentResults = data.results || [];
        selectedIndex = -1;
        renderResults();
        statusBar.textContent = currentResults.length + ' result(s) in ' + elapsed + ' ms';
        previewBody.textContent = 'Select a result to preview.';
        previewHeader.textContent = 'Preview';
      })
      .catch(function(e) {
        if (token !== searchToken) return;
        statusBar.textContent = 'Request failed: ' + e.message;
      });
  }

  function renderResults() {
    resultsBody.innerHTML = '';
    if (currentResults.length === 0) {
      emptyState.style.display = '';
      resultsTable.style.display = 'none';
      return;
    }
    emptyState.style.display = 'none';
    resultsTable.style.display = '';
    currentResults.forEach(function(r, idx) {
      var tr = document.createElement('tr');
      tr.innerHTML =
        '<td class="name">' + (r.directory ? '<span class="dir-icon"></span>' : '<span class="file-icon"></span>') + esc(r.name) + '</td>' +
        '<td class="path" title="' + esc(r.path) + '">' + esc(r.path) + '</td>' +
        '<td class="match">' + esc(r.match || '') + '</td>' +
        '<td class="size">' + formatSize(r.size) + '</td>' +
        '<td class="score">' + (r.score || 0).toFixed(3) + '</td>';
      tr.addEventListener('click', function() { selectRow(idx); });
      resultsBody.appendChild(tr);
    });
  }

  function selectRow(idx) {
    if (selectedIndex === idx) return;
    // 更新高亮
    var rows = resultsBody.querySelectorAll('tr');
    if (selectedIndex >= 0 && rows[selectedIndex]) rows[selectedIndex].classList.remove('selected');
    selectedIndex = idx;
    if (rows[idx]) rows[idx].classList.add('selected');
    loadPreview(currentResults[idx]);
  }

  function loadPreview(r) {
    if (r.directory) {
      previewHeader.textContent = '📁 ' + r.name;
      previewBody.textContent = '[Directory: ' + r.path + ']';
      return;
    }
    previewHeader.textContent = r.name;
    previewBody.innerHTML = '<span class="spinner"></span>Loading…';
    fetch('/api/preview?path=' + encodeURIComponent(r.path))
      .then(function(res) { return res.json(); })
      .then(function(data) {
        if (data.error) { previewBody.textContent = 'Error: ' + data.error; return; }
        previewBody.textContent = (data.text || '') + (data.truncated ? '\n…[truncated]' : '');
      })
      .catch(function(e) { previewBody.textContent = 'Failed: ' + e.message; });
  }

  function esc(s) {
    if (!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // 事件绑定
  searchBtn.addEventListener('click', search);
  queryInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') search(); });
  // 键盘导航
  document.addEventListener('keydown', function(e) {
    if (currentResults.length === 0) return;
    if (e.key === 'ArrowDown') { e.preventDefault(); selectRow(Math.min(selectedIndex + 1, currentResults.length - 1)); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); selectRow(Math.max(selectedIndex - 1, 0)); }
  });
})();
</script>
</body>
</html>
